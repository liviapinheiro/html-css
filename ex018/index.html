<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com Google Fonts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kaushan+Script&display=swap');
        body
        {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
            color: black;
        }

        h1
        {
            font-family: 'Kaushan Script', sans-serif;
        }
        
        p
        {
            font-family: 'Kaushan Script';
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Adipisci commodi libero dolore, aspernatur nostrum optio porro voluptatem voluptatibus consequatur? Expedita iste quo, inventore soluta ex itaque hic. Voluptate, praesentium odit!</p>
</body>
</html>
