<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width: 750px )" srcset="imagens/fotopequena.png" type="image/png"> <!--enquanto a largura do site for até 750, poe a foto pequena-->
        <source media="(max-width: 1050px)" srcset="imagens/fotomedia.png" type="image/png">
        <img src="imagens/fotogrande.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>A maneira mais simples de reproduzir audios no HTML5</p>
    <audio src="midia/wet-hands.mp3" controls ></audio>
    <!--FORMATOS COMPATÍVEIS DE AUDIO: MP3, WAV, .OGG-->

    <P>Agora, uma maneira melhor de reproduzir audios</P>
    <audio preload="metadata" controls>
        <source src="midia/wet-hands.mp3" type="audio/mpeg">
        <source src="midia/wet-hands.ogg" type="audio/ogg">
        <source src="midia/wet-hands.wav" type="audio/wav">
        <p>Infelizmente, não foi possível tocar o audio no seu navegador. <a href="midia/wet-hands.mp3.mp3">Clique aqui para baixar o arquivo</a></p>
        
    </audio>

</body>
</html>
