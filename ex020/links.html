<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body
        {
            font-family: Arial, Helvetica, sans-serif;
        }

        a
        {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited
        {
            color: palevioletred;
        }

        a:hover
        {
            text-decoration: underline;
        }

        a::after
        {
            content: ' [link]';
            color: lightpink;
        }
    </style>
</head>
